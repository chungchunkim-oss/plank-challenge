<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>💪 플랭크 매일 챌린지 - 2026년 4월</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { font-size: 1.1em; opacity: 0.95; }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
        }

        .stat-box { text-align: center; }
        .stat-number { font-size: 2em; font-weight: bold; color: #667eea; }
        .stat-label { color: #666; font-size: 0.9em; margin-top: 5px; }

        .content { padding: 30px; }

        .section-title {
            font-size: 1.4em;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .table-wrapper {
            overflow-x: auto;
            margin-bottom: 30px;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
            min-width: 1300px;
        }

        th {
            background: #667eea;
            color: white;
            padding: 12px 8px;
            text-align: center;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
            white-space: nowrap;
        }

        td {
            padding: 12px 8px;
            text-align: center;
            border: 1px solid #e0e0e0;
            white-space: nowrap;
        }

        td.sticky-col {
            background: #f8f9fa;
            font-weight: 600;
            position: sticky;
            z-index: 6;
        }

        td.rank-col, th.rank-col {
            left: 0;
            min-width: 70px;
        }

        td.name-col, th.name-col {
            left: 70px;
            min-width: 110px;
            text-align: left;
        }

        td.count-col, th.count-col {
            left: 180px;
            min-width: 90px;
        }

        tr:nth-child(even) { background: #f8f9fa; }
        tr:hover { background: #f0f4ff; }

        .checkbox-cell {
            cursor: pointer;
            user-select: none;
            padding: 8px;
            transition: all 0.2s ease;
            font-size: 1.1em;
        }

        .checkbox-cell.completed {
            background: #4CAF50 !important;
            color: white;
            font-weight: bold;
        }

        .checkbox-cell:hover {
            background: #e3f2fd;
            border-radius: 4px;
        }

        .checkbox-cell.completed:hover {
            background: #45a049 !important;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            color: #666;
            font-size: 0.9em;
            border-top: 1px solid #e0e0e0;
        }

        .info-box {
            background: #e8f5e9;
            border-left: 4px solid #4CAF50;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            color: #2e7d32;
            line-height: 1.6;
        }

        .today-highlight {
            background: #ffeb3b !important;
            color: #333 !important;
            font-weight: bold;
        }

        .rank-badge {
            display: inline-block;
            min-width: 34px;
            padding: 4px 8px;
            border-radius: 999px;
            font-weight: bold;
            background: #e8ecff;
            color: #4b57c5;
        }

        .rank-1 { background: #ffd700; color: #333; }
        .rank-2 { background: #c0c0c0; color: #333; }
        .rank-3 { background: #cd7f32; color: white; }

        .count-badge {
            font-weight: bold;
            color: #667eea;
            font-size: 1.05em;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px 5px;
            }

            .container {
                border-radius: 12px;
            }

            .header {
                padding: 24px 16px;
            }

            .header h1 {
                font-size: 1.8em;
                line-height: 1.3;
            }

            .header p {
                font-size: 0.95em;
            }

            .content {
                padding: 15px 10px;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                padding: 20px 12px;
            }

            .stat-number {
                font-size: 1.5em;
            }

            .stat-label {
                font-size: 0.8em;
            }

            table {
                font-size: 0.78em;
                min-width: 1200px;
            }

            td, th {
                padding: 8px 5px;
            }

            td.rank-col, th.rank-col {
                min-width: 55px;
            }

            td.name-col, th.name-col {
                min-width: 90px;
                left: 55px;
                font-size: 0.85em;
            }

            td.count-col, th.count-col {
                min-width: 70px;
                left: 145px;
            }

            .checkbox-cell {
                font-size: 1em;
                min-width: 34px;
                min-height: 34px;
            }

            .info-box {
                font-size: 0.92em;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💪 플랭크 매일 챌린지</h1>
            <p>2026년 4월 7일 ~ 5월 6일 (30일) | 실시간 동기화</p>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-number">16</div>
                <div class="stat-label">참가자</div>
            </div>
            <div class="stat-box">
                <div class="stat-number">30</div>
                <div class="stat-label">일 수</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="totalCompleted">0</div>
                <div class="stat-label">전체 완료 횟수</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="completionRate">0%</div>
                <div class="stat-label">전체 완료율</div>
            </div>
        </div>

        <div class="content">
            <div class="info-box">
                <strong>🏋️ 방법</strong><br>
                매일 자신에 맞는 플랭크를 하시면 됩니다!
            </div>

            <div class="info-box">
                <strong>🏆 순위 자동 반영</strong><br>
                완료 횟수에 따라 순위가 자동으로 갱신됩니다. 셀을 클릭하면 실시간 반영됩니다.
            </div>

            <h2 class="section-title">📋 체크 현황 + 순위표</h2>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>데이터 로딩 중...</p>
            </div>

            <div id="tableContainer" class="table-wrapper" style="display: none;">
                <table id="challengeTable">
                    <thead>
                        <tr id="headerRow">
                            <th class="rank-col">순위</th>
                            <th class="name-col">참가자</th>
                            <th class="count-col">완료</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="footer">
            <p>💪 화이팅! 30일 동안 함께 플랭크 챌린지를 완료해봅시다!</p>
            <p style="margin-top:10px;font-size:0.85em;color:#999;">
                Powered by Supabase | 실시간 데이터 동기화 활성화
            </p>
        </div>
    </div>

    <script>
        const { createClient } = supabase;

        const SUPABASE_URL = 'https://glzxvredpmqpyzmpxdzd.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ea-DM9K8IzX3lBL0qUb6qg_tMYYE7vU';

        const client = createClient(SUPABASE_URL, SUPABASE_KEY);

        const participants = [
            '김복기', '김성민', '김유진', '김진아', '김철민', '김한봉희',
            '문채린', '백지', '유정숙', '유승우', '윤희성',
            '이혜진', '전세훈', '정민주', '최아람', '홍서정'
        ];

        const dates = [];
        const startDate = new Date(2026, 3, 7);
        for (let i = 0; i < 30; i++) {
            const date = new Date(startDate);
            date.setDate(date.getDate() + i);
            dates.push({
                label: `${date.getMonth() + 1}/${date.getDate()}`,
                fullDate: `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`
            });
        }

        let data = {};
        let tableCreated = false;
        let realtimeSubscribed = false;

        async function loadData() {
            try {
                const { data: records, error } = await client
                    .from('challenge')
                    .select('*');

                if (error) throw error;

                data = {};

                (records || []).forEach(record => {
                    data[`${record.participant}-${record.date_index}`] = record.completed;
                });

                if (!tableCreated) {
                    createTable();
                    tableCreated = true;
                } else {
                    renderTable();
                }

                updateStats();

                if (!realtimeSubscribed) {
                    setupRealtimeSubscription();
                    realtimeSubscribed = true;
                }

            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('loading').innerHTML =
                    '<p style="color:red;">데이터 로드 실패: ' + error.message + '</p>';
            }
        }

        function getParticipantCount(participant) {
            let count = 0;
            dates.forEach((_, dateIndex) => {
                if (data[`${participant}-${dateIndex}`] === true) count++;
            });
            return count;
        }

        function getRankedParticipants() {
            const ranked = participants.map(name => ({
                name,
                count: getParticipantCount(name)
            }));

            ranked.sort((a, b) => {
                if (b.count !== a.count) return b.count - a.count;
                return a.name.localeCompare(b.name, 'ko');
            });

            let currentRank = 1;
            for (let i = 0; i < ranked.length; i++) {
                if (i > 0 && ranked[i].count < ranked[i - 1].count) {
                    currentRank = i + 1;
                }
                ranked[i].rank = currentRank;
            }

            return ranked;
        }

        function createTable() {
            const headerRow = document.getElementById('headerRow');
            headerRow.innerHTML = `
                <th class="rank-col">순위</th>
                <th class="name-col">참가자</th>
                <th class="count-col">완료</th>
            `;

            const todayStr = getTodayKST();

            dates.forEach((dateObj, index) => {
                const th = document.createElement('th');
                th.textContent = dateObj.label;
                if (dateObj.fullDate === todayStr) {
                    th.classList.add('today-highlight');
                }
                th.dataset.dateIndex = index;
                headerRow.appendChild(th);
            });

            renderTable();

            document.getElementById('loading').style.display = 'none';
            document.getElementById('tableContainer').style.display = 'block';
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            const rankedParticipants = getRankedParticipants();
            const todayStr = getTodayKST();

            rankedParticipants.forEach(({ name, count, rank }) => {
                const row = document.createElement('tr');

                const rankCell = document.createElement('td');
                rankCell.className = 'sticky-col rank-col';
                rankCell.innerHTML = `<span class="rank-badge ${rank <= 3 ? `rank-${rank}` : ''}">${rank}위</span>`;
                row.appendChild(rankCell);

                const nameCell = document.createElement('td');
                nameCell.className = 'sticky-col name-col';
                nameCell.textContent = name;
                row.appendChild(nameCell);

                const countCell = document.createElement('td');
                countCell.className = 'sticky-col count-col';
                countCell.innerHTML = `<span class="count-badge">${count}회</span>`;
                row.appendChild(countCell);

                dates.forEach((dateObj, dateIndex) => {
                    const cell = document.createElement('td');
                    const isChecked = data[`${name}-${dateIndex}`] === true;

                    cell.classList.add('checkbox-cell');
                    cell.textContent = isChecked ? '✅' : '⬜';

                    if (isChecked) {
                        cell.classList.add('completed');
                    }

                    if (dateObj.fullDate === todayStr) {
                        cell.style.boxShadow = 'inset 0 0 0 2px #ffeb3b';
                    }

                    cell.onclick = () => toggleCell(name, dateIndex);
                    row.appendChild(cell);
                });

                tbody.appendChild(row);
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('tableContainer').style.display = 'block';
        }

        async function toggleCell(participant, dateIndex) {
            const key = `${participant}-${dateIndex}`;
            const isCurrentlyCompleted = data[key] === true;
            const newValue = !isCurrentlyCompleted;

            data[key] = newValue;
            renderTable();
            updateStats();

            try {
                const { error } = await client
                    .from('challenge')
                    .upsert(
                        [{
                            participant: participant,
                            date_index: dateIndex,
                            completed: newValue
                        }],
                        {
                            onConflict: 'participant,date_index'
                        }
                    );

                if (error) throw error;

            } catch (error) {
                console.error('Error updating:', error);

                data[key] = isCurrentlyCompleted;
                renderTable();
                updateStats();

                alert('업데이트 실패: ' + error.message);
            }
        }

        function updateStats() {
            let totalCompleted = 0;

            Object.values(data).forEach(val => {
                if (val === true) totalCompleted++;
            });

            const totalPossible = participants.length * dates.length;
            const completionRate = Math.round((totalCompleted / totalPossible) * 100);

            document.getElementById('totalCompleted').textContent = totalCompleted;
            document.getElementById('completionRate').textContent = completionRate + '%';
        }

        function setupRealtimeSubscription() {
            client
                .channel('challenge_changes')
                .on(
                    'postgres_changes',
                    { event: '*', schema: 'public', table: 'challenge' },
                    (payload) => {
                        const record = payload.new;
                        if (!record) return;

                        const key = `${record.participant}-${record.date_index}`;
                        data[key] = record.completed;
                        renderTable();
                        updateStats();
                    }
                )
                .subscribe((status) => {
                    console.log('Realtime status:', status);
                });
        }

        function getTodayKST() {
            const now = new Date();
            const kst = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
            const yyyy = kst.getFullYear();
            const mm = String(kst.getMonth() + 1).padStart(2, '0');
            const dd = String(kst.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        loadData();
    </script>
</body>
</html>
