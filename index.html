<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💪 플랭크 매일 챌린지 - 2026년 4월</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/+esm"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.95;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
        }

        .stat-box {
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .content {
            padding: 30px;
        }

        .section-title {
            font-size: 1.4em;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .table-wrapper {
            overflow-x: auto;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        th {
            background: #667eea;
            color: white;
            padding: 12px 8px;
            text-align: center;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 12px 8px;
            text-align: center;
            border: 1px solid #e0e0e0;
        }

        td:first-child {
            background: #f8f9fa;
            font-weight: 500;
            text-align: left;
            position: sticky;
            left: 0;
            z-index: 5;
            min-width: 100px;
        }

        tr:nth-child(even) {
            background: #f8f9fa;
        }

        tr:hover {
            background: #f0f4ff;
        }

        .checkbox-cell {
            cursor: pointer;
            user-select: none;
            padding: 8px;
            transition: all 0.2s ease;
        }

        .checkbox-cell.completed {
            background: #4CAF50 !important;
            color: white;
            font-weight: bold;
        }

        .checkbox-cell:hover {
            background: #e3f2fd;
            border-radius: 4px;
        }

        .checkbox-cell.completed:hover {
            background: #45a049 !important;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            color: #666;
            font-size: 0.9em;
            border-top: 1px solid #e0e0e0;
        }

        .info-box {
            background: #e8f5e9;
            border-left: 4px solid #4CAF50;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            color: #2e7d32;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            table {
                font-size: 0.8em;
            }

            td, th {
                padding: 8px 4px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💪 플랭크 매일 챌린지</h1>
            <p>2026년 4월 7일 ~ 5월 6일 (30일) | 실시간 동기화</p>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-number">16</div>
                <div class="stat-label">참가자</div>
            </div>
            <div class="stat-box">
                <div class="stat-number">30</div>
                <div class="stat-label">일 수</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="totalCompleted">0</div>
                <div class="stat-label">완료 횟수</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="completionRate">0%</div>
                <div class="stat-label">완료율</div>
            </div>
        </div>

        <div class="content">
            <div class="info-box">
                <strong>✅ 실시간 동기화</strong><br>
                테이블의 셀을 클릭하면 모든 참가자에게 즉시 반영됩니다! 다시 클릭하면 체크 해제됩니다.
            </div>

            <h2 class="section-title">📋 체크 현황</h2>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>데이터 로딩 중...</p>
            </div>

            <div id="tableContainer" class="table-wrapper" style="display: none;">
                <table id="challengeTable">
                    <thead>
                        <tr id="headerRow">
                            <th>참가자</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="footer">
            <p>💪 화이팅! 30일 동안 함께 플랭크 챌린지를 완료해봅시다!</p>
            <p style="margin-top: 10px; font-size: 0.85em; color: #999;">Powered by Supabase | 실시간 데이터 동기화 활성화</p>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/+esm'

        // ⚠️ Supabase API 정보
        const SUPABASE_URL = 'https://glzxvredpmqpyzmpxdzd.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ea-DM9K8IzX3lBL0qUb6qg_tMYYE7vU';

        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        const participants = [
            '김복기', '김성민', '김유진', '김진아', '김철민', '김한봉희',
            '문채린', '백지', '유정숙', '유승우', '윤희성',
            '이혜진', '전세훈', '정민주', '최아람', '홍서정'
        ];

        const dates = [];
        const startDate = new Date(2026, 3, 7);

        for (let i = 0; i < 30; i++) {
            const date = new Date(startDate);
            date.setDate(date.getDate() + i);
            const month = date.getMonth() + 1;
            const day = date.getDate();
            dates.push(`${month}/${day}`);
        }

        let data = {};

        // 데이터 로드
        async function loadData() {
            try {
                const { data: records, error } = await supabase
                    .from('challenge')
                    .select('*');

                if (error) throw error;

                records.forEach(record => {
                    const key = `${record.participant}-${record.date_index}`;
                    data[key] = record.completed;
                });

                createTable();
                updateStats();
                setupRealtimeSubscription();

            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('loading').innerHTML = '<p style="color: red;">데이터 로드 실패. 페이지를 새로고침하세요.</p>';
            }
        }

        // 테이블 생성
        function createTable() {
            const headerRow = document.getElementById('headerRow');
            dates.forEach(date => {
                const th = document.createElement('th');
                th.textContent = date;
                headerRow.appendChild(th);
            });

            const tbody = document.getElementById('tableBody');
            participants.forEach(participant => {
                const row = document.createElement('tr');
                const nameCell = document.createElement('td');
                nameCell.textContent = participant;
                nameCell.style.fontWeight = '600';
                row.appendChild(nameCell);

                dates.forEach((date, dateIndex) => {
                    const cell = document.createElement('td');
                    const key = `${participant}-${dateIndex}`;
                    const isChecked = data[key] === true;

                    cell.classList.add('checkbox-cell');
                    cell.textContent = isChecked ? '✅' : '⬜';

                    if (isChecked) {
                        cell.classList.add('completed');
                    }

                    cell.onclick = () => toggleCell(participant, dateIndex, cell);
                    row.appendChild(cell);
                });

                tbody.appendChild(row);
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('tableContainer').style.display = 'block';
        }

        // 셀 토글
        async function toggleCell(participant, dateIndex, cell) {
            const isCurrentlyCompleted = data[`${participant}-${dateIndex}`] === true;
            const newValue = !isCurrentlyCompleted;

            try {
                const { error } = await supabase
                    .from('challenge')
                    .update({ completed: newValue })
                    .eq('participant', participant)
                    .eq('date_index', dateIndex);

                if (error) throw error;

                data[`${participant}-${dateIndex}`] = newValue;
                cell.textContent = newValue ? '✅' : '⬜';
                cell.classList.toggle('completed');
                updateStats();

            } catch (error) {
                console.error('Error updating data:', error);
                alert('업데이트 실패. 다시 시도해주세요.');
            }
        }

        // 통계 업데이트
        function updateStats() {
            let totalCompleted = 0;
            Object.values(data).forEach(val => {
                if (val === true) totalCompleted++;
            });

            const totalPossible = participants.length * 30;
            const completionRate = Math.round((totalCompleted / totalPossible) * 100);

            document.getElementById('totalCompleted').textContent = totalCompleted;
            document.getElementById('completionRate').textContent = completionRate + '%';
        }

        // 실시간 구독 (다른 사용자 변경 감지)
        function setupRealtimeSubscription() {
            supabase
                .channel('challenge_changes')
                .on(
                    'postgres_changes',
                    { event: '*', schema: 'public', table: 'challenge' },
                    (payload) => {
                        const record = payload.new;
                        const key = `${record.participant}-${record.date_index}`;
                        data[key] = record.completed;

                        // UI 업데이트
                        updateTableCell(record.participant, record.date_index);
                        updateStats();
                    }
                )
                .subscribe();
        }

        // 테이블 셀 업데이트 (다른 사용자 변경)
        function updateTableCell(participant, dateIndex) {
            const rows = document.querySelectorAll('#tableBody tr');
            const participantIndex = participants.indexOf(participant);

            if (participantIndex !== -1) {
                const row = rows[participantIndex];
                const cell = row.querySelectorAll('td')[dateIndex + 1];

                if (cell) {
                    const isCompleted = data[`${participant}-${dateIndex}`] === true;
                    cell.textContent = isCompleted ? '✅' : '⬜';
                    cell.classList.toggle('completed', isCompleted);
                }
            }
        }

        // 초기 데이터 로드
        loadData();
    </script>
</body>
</html>
